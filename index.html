<!DOCTYPE html>
<html>
<head>
<title>Passport Generator</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:20px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
}

img {
    width:100%;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h3>📸 Passport Generator</h3>

<input type="file" id="img"><br><br>
<input type="number" id="pieces" value="4"><br><br>

<button onclick="send()">Generate</button>

<p id="status"></p>
<img id="out">

</div>

<script>
async function send(){
    let file = document.getElementById("img").files[0];
    let pieces = document.getElementById("pieces").value;

    if(!file){
        alert("Image select karo");
        return;
    }

    let form = new FormData();
    form.append("image", file);
    form.append("pieces", pieces);

    document.getElementById("status").innerText = "Processing...";

    try{
        let res = await fetch("http://localhost:5000/passport",{
            method:"POST",
            body:form
        });

        let blob = await res.blob();
        let url = URL.createObjectURL(blob);

        document.getElementById("out").src = url;
        document.getElementById("status").innerText = "Done ✅";

    }catch(e){
        document.getElementById("status").innerText = "Error ❌";
        alert(e);
    }
}
</script>

</body>
</html>
